version = "2"

# CCR-Rust SLOC Guard Configuration
# Methodology: 750 SLOC hard limit (comments/blanks excluded), 600 SLOC warning.
# Existing oversized files are grandfathered via baseline with ratchet=warn.
# Rationale:
#   - Rust community cognitive threshold: ~1000 LOC (users.rust-lang.org)
#   - TigerStyle: "minimize the cut" — optimize module_size / interface_size ratio
#   - sloc-guard default: 600 for strict presets
#   - Our choice: 750 balances Rust verbosity (match arms, error types) with readability
#   - Files above 750 SLOC must be split into submodules before merging

[scanner]
gitignore = true
exclude = [".git/**", "target/**", "benches/**", "benchmarks/**"]

[content]
extensions = ["rs"]
max_lines = 750      # Hard limit: 750 SLOC per file
warn_threshold = 0.8 # Warn at 80% (600 SLOC)
skip_comments = true # Don't count // and /* */ comments
skip_blank = true    # Don't count blank lines

[structure]
max_files = 20       # Max source files per directory
max_dirs = 10        # Max subdirectories
max_depth = 5        # Max nesting depth
warn_threshold = 0.8

[baseline]
ratchet = "warn" # Violations can only decrease over time

[check]
warnings_as_errors = false # Warnings don't fail CI (yet)
fail_fast = false

# --- Grandfathered overrides for existing large files ---
# These files exceed 750 SLOC today. Each has a tighter limit set to its
# current size, preventing growth. As modularization tasks run, reduce
# these limits or remove the overrides entirely.

[[content.rules]]
pattern = "src/router/responses_api.rs"
max_lines = 950
reason = "OpenAI Responses API handler — split into responses_api/{types,handlers,streaming}.rs"

